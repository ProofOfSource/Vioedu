<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VioEdu Tiếng Anh Lớp 1 - Vòng Quốc Gia (Không lặp câu hỏi)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a237e; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        h1 { text-align: center; color: #b71c1c; margin-bottom: 5px; font-size: 32px; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #283593; margin-top: 0; margin-bottom: 25px; font-size: 18px; font-weight: 600; }
        
        #menuContainer { display: flex; flex-direction: column; gap: 14px; align-items: center; margin-top: 20px; }
        .btn-test { width: 85%; padding: 18px; font-size: 19px; font-weight: bold; color: white; background: #c62828; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); text-transform: uppercase; }
        .btn-test:hover { background: #b71c1c; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
        .btn-test:nth-child(even) { background: #1565c0; }
        .btn-test:nth-child(even):hover { background: #0d47a1; }

        #quizWrapper { display: none; }
        .header-info { display: flex; justify-content: space-between; align-items: center; background: #e8eaf6; padding: 15px 25px; border-radius: 10px; margin-bottom: 30px; font-weight: bold; font-size: 18px; border-left: 6px solid #3f51b5; }
        .timer { color: #d32f2f; font-size: 28px; display: flex; align-items: center; gap: 8px; font-family: monospace; }
        
        .question-card { background: #f5f5f5; padding: 22px; border-radius: 12px; margin-bottom: 22px; border: 2px solid #e0e0e0; transition: 0.3s; }
        .question-card:hover { border-color: #3f51b5; box-shadow: 0 5px 15px rgba(63,81,181,0.15); }
        .question-title { font-size: 19px; font-weight: 700; margin-bottom: 18px; color: #1a237e; line-height: 1.4; }
        
        .btn-listen { background: #8e24aa; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-listen:hover { background: #6a1b9a; }

        .options { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .options label { display: flex; align-items: center; padding: 15px; background: #fff; border: 2px solid #cfd8dc; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 18px; font-weight: 600; color: #455a64; }
        .options label:hover { background: #e8eaf6; border-color: #3f51b5; color: #1a237e; }
        input[type="radio"] { margin-right: 15px; transform: scale(1.5); cursor: pointer; accent-color: #3f51b5; }
        
        .btn-submit { width: 100%; padding: 18px; font-size: 24px; font-weight: bold; color: white; background-color: #2e7d32; border: none; border-radius: 12px; cursor: pointer; margin-top: 25px; text-transform: uppercase; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .btn-submit:hover { background-color: #1b5e20; }
        .btn-back { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; color: white; background-color: #546e7a; border: none; border-radius: 12px; cursor: pointer; margin-top: 15px; }
        
        #result { display: none; text-align: center; margin-top: 30px; padding: 25px; border-radius: 12px; font-size: 24px; font-weight: bold; line-height: 1.6; }
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }
        
        .correct-ans { background: #c8e6c9 !important; border-color: #4caf50 !important; color: #1b5e20 !important; }
        .wrong-ans { background: #ffcdd2 !important; border-color: #f44336 !important; color: #b71c1c !important; text-decoration: line-through; }

        @media (max-width: 600px) {
            .options { grid-template-columns: 1fr; }
            .header-info { flex-direction: column; gap: 12px; }
        }
    </style>
</head>

                    { q: "25 + 25 = ?", o: ["40", "45", "50", "55"], a: 2 },
                    { q: "What is double 10? (Gấp đôi 10)", o: ["10", "20", "30", "40"], a: 1 },
                    { q: "What is half of 100?", o: ["25", "50", "75", "100"], a: 1 },
                    { q: "There are 3 boxes. Each box has 5 balls. Total balls?", o: ["8", "10", "15", "20"], a: 2 },
                    { q: "48 - 24 = ?", o: ["20", "22", "24", "26"], a: 2 },
                    { q: "Which month comes first in a year?", o: ["February", "December", "January", "March"], a: 2 },
                    { q: "10 + 20 + 15 = ?", o: ["35", "40", "45", "50"], a: 2 },
                    { q: "How many letters are in the word 'ELEPHANT'?", o: ["6", "7", "8", "9"], a: 2 },
                    { q: "99 + 1 = ?", o: ["98", "90", "100", "101"], a: 2 },
                    { q: "If I have 2 tens and 3 ones, what number is it? (2 chục 3 đơn vị)", o: ["5", "32", "23", "20"], a: 2 },
                    { q: "Who flies an airplane?", o: ["Doctor", "Pilot", "Farmer", "Chef"], a: 1 },
                    { q: "A sofa is usually in the _____.", o: ["Bathroom", "Kitchen", "Living room", "Garden"], a: 2 },
                    { q: "100 - 1 = ?", o: ["90", "98", "99", "101"], a: 2 },
                    { q: "(Nghe) Nghề nghiệp:", l: "He is a brave policeman.", o: ["Cảnh sát", "Bác sĩ", "Thợ xây", "Nông dân"], a: 0 },
                    { q: "(Nghe) Phòng nào trong nhà?", l: "I sleep in the bedroom.", o: ["Phòng khách", "Phòng bếp", "Phòng tắm", "Phòng ngủ"], a: 3 },
                    { q: "(Nghe) Đang làm gì?", l: "She is singing a song.", o: ["Đang nhảy", "Đang hát", "Đang vẽ", "Đang ăn"], a: 1 },
                    { q: "(Nghe) Toán IQ:", l: "Double five is ten.", o: ["5+5=10", "5+2=7", "10-5=5", "10+10=20"], a: 0 },
                    { q: "(Nghe) Khả năng:", l: "A monkey can climb trees.", o: ["Bơi", "Bay", "Trèo cây", "Chạy"], a: 2 },
                    { q: "(Nghe) Tháng mấy?", l: "My birthday is in January.", o: ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4"], a: 0 }
                ]
            }
        };

        let currentTestIndex = 16;
        let timerInterval;
        let timeRemaining;
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.25);
                gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            }
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Trình duyệt không hỗ trợ phát âm thanh.");
            }
        }

        window.startTest = function(index) {
            initAudio(); 
            currentTestIndex = index;
            document.getElementById('menuContainer').style.display = 'none';
            document.getElementById('quizWrapper').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            
            const test = allTests[index];
            document.getElementById('testTitle').innerText = test.title;
            
            // Xáo trộn vị trí 30 câu trong đề hiện tại để mỗi lần làm lại đều có cảm giác mới
            let shuffledQuestions = [...test.questions];
            for (let i = shuffledQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
            }
            test.currentShuffled = shuffledQuestions;
            
            renderQuestions(shuffledQuestions);
            
            timeRemaining = 20 * 60; 
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
            window.scrollTo(0, 0);
        };

        function updateTimer() {
            let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            let s = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timeDisplay').innerText = `⏱ ${m}:${s}`;
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            }
            timeRemaining--;
        }

        function renderQuestions(questions) {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            
            questions.forEach((item, index) => {
                let listenHTML = item.l ? `<button class="btn-listen" type="button" onclick="speakText('${item.l}')">🎧 Bấm để nghe Audio</button>` : '';
                
                let optionsHTML = item.o.map((opt, i) => `
                    <li>
                        <label id="lbl_q${index}_opt${i}">
                            <input type="radio" name="q${index}" value="${i}"> ${opt}
                        </label>
                    </li>
                `).join('');

                container.innerHTML += `
                    <div class="question-card" id="card_q${index}">
                        <div class="question-title">Câu ${index + 1}: ${item.q}</div>
                        ${listenHTML}
                        <ul class="options">${optionsHTML}</ul>
                    </div>
                `;
            });
        }

        window.submitQuiz = function() {
            clearInterval(timerInterval);
            const test = allTests[currentTestIndex];
            const questions = test.currentShuffled;
            let score = 0;
            let correctCount = 0;

            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const labels = document.querySelectorAll(`input[name="q${index}"]`);
                
                document.getElementById(`lbl_q${index}_opt${item.a}`).classList.add('correct-ans');

                if (selected) {
                    if (parseInt(selected.value) === item.a) {
                        score += 10; 
                        correctCount++;
                        playSound('correct');
                    } else {
                        document.getElementById(`lbl_q${index}_opt${selected.value}`).classList.add('wrong-ans');
                        playSound('wrong');
                    }
                } else {
                    playSound('wrong');
                }
                
                labels.forEach(r => r.disabled = true);
            });

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';

            if (score >= 250) {
                resultDiv.innerHTML = `🏆 TUYỆT ĐỈNH!<br>Duy Thức đạt ${score}/300 điểm (${correctCount}/30 câu). Con hoàn toàn làm chủ được kiến thức Vòng Quốc Gia!`;
                resultDiv.style.backgroundColor = '#e8f5e9'; resultDiv.style.color = '#1b5e20';
                startConfetti();
            } else if (score >= 180) {
                resultDiv.innerHTML = `👍 RẤT GIỎI!<br>Duy Thức đạt ${score}/300 điểm (${correctCount}/30 câu). Khả năng tập trung của con rất đáng khen!`;
                resultDiv.style.backgroundColor = '#e3f2fd'; resultDiv.style.color = '#0d47a1';
            } else {
                resultDiv.innerHTML = `💪 KHÔNG SAO ĐÂU CHÀNG TRAI!<br>Duy Thức đạt ${score}/300 điểm (${correctCount}/30 câu).<br><span style="font-size: 16px; font-weight: normal; color: #424242;">Ba Đức hãy ôn lại các câu bôi đỏ cùng con nhé, đề này cực kỳ khó luôn!</span>`;
                resultDiv.style.backgroundColor = '#fff3e0'; resultDiv.style.color = '#b71c1c';
            }
            window.scrollTo(0, 0);
        };

        window.backToMenu = function() {
            document.getElementById('menuContainer').style.display = 'flex';
            document.getElementById('quizWrapper').style.display = 'none';
            window.scrollTo(0, 0);
        };

        function startConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            canvas.style.display = 'block';
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const particles = [];
            for (let i = 0; i < 250; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, size: Math.random() * 8 + 3, speed: Math.random() * 5 + 3, color: `hsl(${Math.random() * 360}, 100%, 50%)` });
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.y += p.speed; if (p.y > canvas.height) p.y = -10; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
                requestAnimationFrame(animate);
            }
            animate();
            setTimeout(() => { canvas.style.display = 'none'; }, 7000);
        }
    </script>
</body>
</html>
