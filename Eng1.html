<!DOCTYPE html>
<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đấu Trường VioEdu Tiếng Anh - Lớp 1 (Phần 2)</title>
    <style>
        body { font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; background-color: #f3e5f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); position: relative; z-index: 10; }
        h1 { text-align: center; color: #9c27b0; font-size: 32px; text-shadow: 1px 1px 2px #ce93d8; }
        h2 { text-align: center; color: #0288d1; margin-bottom: 20px; }
        
        #menuContainer { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 30px; }
        .btn-test { width: 80%; padding: 15px; font-size: 20px; font-weight: bold; color: white; background: #ab47bc; border: none; border-radius: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-test:hover { background: #8e24aa; transform: translateY(-2px); }
        .btn-test:nth-child(even) { background: #03a9f4; }
        .btn-test:nth-child(even):hover { background: #0288d1; }

        #quizWrapper { display: none; }
        .timer { font-size: 28px; font-weight: bold; color: #d32f2f; text-align: center; margin-bottom: 20px; padding: 10px 20px; border: 3px dashed #d32f2f; border-radius: 15px; width: fit-content; margin: 0 auto 30px auto; background: #ffebee; }
        .question-card { background: #fafafa; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 6px solid #ff9800; position: relative; }
        .question-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #e65100; }
        
        .btn-listen { background: #ec407a; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-listen:hover { background: #d81b60; }

        .options { list-style: none; padding: 0; margin: 0; }
        .options li { margin-bottom: 10px; }
        .options label { display: flex; align-items: center; padding: 12px; background: #fff; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 18px; font-weight: bold; }
        .options label:hover { background: #fff3e0; border-color: #ff9800; }
        input[type="radio"] { margin-right: 15px; transform: scale(1.5); cursor: pointer; }
        
        .btn-submit { width: 100%; padding: 15px; font-size: 22px; font-weight: bold; color: white; background-color: #4caf50; border: none; border-radius: 15px; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background-color: #388e3c; }
        .btn-back { width: 100%; padding: 15px; font-size: 20px; font-weight: bold; color: white; background-color: #9e9e9e; border: none; border-radius: 15px; cursor: pointer; margin-top: 10px; }
        
        #result { display: none; text-align: center; margin-top: 30px; padding: 20px; border-radius: 15px; font-size: 24px; font-weight: bold; }
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }
        
        .correct-ans { background: #c8e6c9 !important; border-color: #4caf50 !important; }
        .wrong-ans { background: #ffcdd2 !important; border-color: #f44336 !important; }
    </style>
</head>
