<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đấu Trường VioEdu - Lớp 5 (Vòng Khu Vực)</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #eef2f3; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        h1 { text-align: center; color: #1565c0; margin-bottom: 5px; font-size: 30px; text-transform: uppercase; letter-spacing: 1px; }
        h2 { text-align: center; color: #ef6c00; margin-top: 0; margin-bottom: 25px; font-size: 18px; font-weight: normal; }
        
        #menuContainer { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 30px; }
        .btn-test { width: 85%; padding: 16px; font-size: 18px; font-weight: bold; color: white; background: #1976d2; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 0 3px 5px rgba(0,0,0,0.1); }
        .btn-test:hover { background: #1565c0; transform: translateY(-2px); }
        .btn-test:nth-child(even) { background: #e65100; }
        .btn-test:nth-child(even):hover { background: #ef6c00; }

        #quizWrapper { display: none; }
        .header-info { display: flex; justify-content: space-between; align-items: center; background: #f3e5f5; padding: 15px 25px; border-radius: 8px; margin-bottom: 30px; font-weight: bold; font-size: 18px; border-left: 5px solid #ab47bc; }
        .timer { color: #d32f2f; font-size: 26px; display: flex; align-items: center; gap: 8px; font-family: monospace; }
        
        .question-card { background: #fafafa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e0e0e0; transition: 0.3s; }
        .question-card:hover { border-color: #2196f3; box-shadow: 0 4px 8px rgba(33,150,243,0.1); }
        .question-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #2c3e50; line-height: 1.5; }
        
        .options { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .options label { display: flex; align-items: center; padding: 14px; background: #fff; border: 1px solid #cfd8dc; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .options label:hover { background: #e3f2fd; border-color: #64b5f6; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.4); cursor: pointer; accent-color: #1976d2; }
        
        .btn-submit { width: 100%; padding: 16px; font-size: 20px; font-weight: bold; color: white; background-color: #2e7d32; border: none; border-radius: 8px; cursor: pointer; margin-top: 25px; text-transform: uppercase; }
        .btn-submit:hover { background-color: #1b5e20; }
        .btn-back { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: white; background-color: #757575; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        #result { display: none; text-align: center; margin-top: 30px; padding: 25px; border-radius: 8px; font-size: 22px; font-weight: bold; line-height: 1.6; }
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }
        
        .correct-ans { background: #c8e6c9 !important; border-color: #4caf50 !important; color: #1b5e20; font-weight: bold; }
        .wrong-ans { background: #ffcdd2 !important; border-color: #f44336 !important; color: #b71c1c; text-decoration: line-through; }

        .subject-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; color: white; margin-right: 8px; vertical-align: bottom; }
        .bg-math { background-color: #1976d2; }
        .bg-viet { background-color: #e53935; }
        .bg-logic { background-color: #fb8c00; }

        @media (max-width: 768px) {
            .options { grid-template-columns: 1fr; }
            .header-info { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>
    <div class="container">
        <h1>Đấu Trường VioEdu - Khối 5</h1>
        <h2>Thời gian: 20 phút - Tổng số: 30 câu hỏi</h2>

        <div id="menuContainer">
            <h3 style="color: #455a64; margin-bottom: 20px;">Hệ thống sinh đề ngẫu nhiên:</h3>
            <button class="btn-test" onclick="startTest(1)">📝 ĐỀ THI SỐ 1 (Toán, Tiếng Việt, Logic)</button>
            <button class="btn-test" onclick="startTest(2)">📝 ĐỀ THI SỐ 2 (Toán, Tiếng Việt, Logic)</button>
            <button class="btn-test" onclick="startTest(3)">📝 ĐỀ THI SỐ 3 (Toán, Tiếng Việt, Logic)</button>
            <button class="btn-test" onclick="startTest(4)">📝 ĐỀ THI SỐ 4 (Toán, Tiếng Việt, Logic)</button>
            <button class="btn-test" onclick="startTest(5)">🏆 ĐỀ THI SỐ 5 (Thử thách Vòng Thành Phố)</button>
        </div>

        <div id="quizWrapper">
            <h3 id="testTitle" style="text-align: center; color: #d32f2f; font-size: 24px;"></h3>
            <div class="header-info">
                <div>Phân môn: Toán (15), TV (10), Logic (5)</div>
                <div class="timer" id="timeDisplay">⏱ 20:00</div>
            </div>
            
            <div id="quizContainer"></div>
            
            <button class="btn-submit" id="submitBtn" onclick="submitQuiz()">Nộp Bài Kết Thúc</button>
            <button class="btn-back" id="backBtn" onclick="backToMenu()" style="display:none;">Quay Lại Chọn Đề Khác</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        // NGÂN HÀNG CÂU HỎI LỚP 5
        const mathBank = [
            { q: "Số thập phân gồm 5 đơn vị, 3 phần trăm được viết là:", o: ["5,3", "5,03", "5,30", "0,53"], a: 1 },
            { q: "Tìm 25% của 120:", o: ["30", "40", "25", "120"], a: 0 },
            { q: "Diện tích hình tam giác có đáy 10cm, chiều cao 5cm là:", o: ["50 cm2", "25 cm2", "15 cm2", "100 cm2"], a: 1 },
            { q: "Một ô tô đi với vận tốc 40 km/giờ. Quãng đường ô tô đi trong 2,5 giờ là:", o: ["100 km", "80 km", "120 km", "60 km"], a: 0 },
            { q: "Hình thang có đáy lớn 12cm, đáy bé 8cm, chiều cao 5cm. Diện tích hình thang đó là:", o: ["100 cm2", "50 cm2", "40 cm2", "80 cm2"], a: 1 },
            { q: "Phân số 3/4 được viết dưới dạng số thập phân là:", o: ["0,34", "3,4", "0,75", "0,25"], a: 2 },
            { q: "1 giờ 15 phút = ... phút. Số thích hợp điền vào chỗ chấm là:", o: ["115", "75", "15", "65"], a: 1 },
            { q: "Chu vi hình tròn có bán kính r = 2cm là (Lấy pi = 3,14):", o: ["12,56 cm", "6,28 cm", "3,14 cm", "25,12 cm"], a: 0 },
            { q: "Giá trị của biểu thức: 12,5 x 0,1 là:", o: ["125", "1,25", "0,125", "1250"], a: 1 },
            { q: "Tìm x biết: x + 2,5 = 5,2. Giá trị của x là:", o: ["2,7", "7,7", "3,3", "2,5"], a: 0 },
            { q: "4m 5cm = ... m. Số thập phân thích hợp là:", o: ["4,5", "4,05", "4,50", "4,005"], a: 1 },
            { q: "Số lớn nhất trong các số: 3,45; 3,54; 3,05; 3,5 là:", o: ["3,45", "3,54", "3,05", "3,5"], a: 1 },
            { q: "Trung bình cộng của 3 số: 4, 5, 6 là:", o: ["4", "5", "6", "15"], a: 1 },
            { q: "Mua 5 quyển vở hết 40.000 đồng. Hỏi mua 8 quyển vở hết bao nhiêu tiền?", o: ["60.000 đ", "64.000 đ", "50.000 đ", "72.000 đ"], a: 1 },
            { q: "Tỉ số phần trăm của 3 và 4 là:", o: ["75%", "34%", "43%", "133%"], a: 0 },
            { q: "Kết quả của phép tính 2,5 x 4,4 là:", o: ["10", "11", "11,5", "12"], a: 1 },
            { q: "Một người đi xe máy trong 3 giờ được 105 km. Vận tốc của người đó là:", o: ["30 km/h", "35 km/h", "40 km/h", "45 km/h"], a: 1 },
            { q: "Diện tích hình tròn có đường kính 10cm là:", o: ["78,5 cm2", "31,4 cm2", "314 cm2", "785 cm2"], a: 0 },
            { q: "Thể tích hình lập phương có cạnh 3cm là:", o: ["9 cm3", "18 cm3", "27 cm3", "36 cm3"], a: 2 },
            { q: "25% của một số là 50. Số đó là:", o: ["100", "150", "200", "250"], a: 2 }
        ];

        const vietBank = [
            { q: "Từ nào trái nghĩa với từ 'Hòa bình'?", o: ["Chiến tranh", "Lặng im", "Ồn ào", "Thái bình"], a: 0 },
            { q: "Cặp quan hệ từ 'Tuy ... nhưng ...' biểu thị quan hệ gì?", o: ["Nguyên nhân - Kết quả", "Điều kiện - Kết quả", "Tương phản", "Tăng tiến"], a: 2 },
            { q: "Từ 'chín' trong câu 'Cơm đã chín' và 'Suy nghĩ chín chắn' là hiện tượng gì?", o: ["Từ đồng âm", "Từ nhiều nghĩa", "Từ đồng nghĩa", "Từ trái nghĩa"], a: 1 },
            { q: "Câu 'Trời mưa to nên đường phố bị ngập.' là kiểu câu gì?", o: ["Câu đơn", "Câu ghép", "Câu hỏi", "Câu cảm"], a: 1 },
            { q: "Xác định chủ ngữ trong câu: 'Dưới bóng tre, thấp thoáng mái chùa cổ kính.'", o: ["Dưới bóng tre", "thấp thoáng", "mái chùa cổ kính", "bóng tre"], a: 2 },
            { q: "Từ nào sau đây viết SAI chính tả?", o: ["Xán lạn", "Sáng sủa", "Xuất sứ", "Xinh xắn"], a: 2 },
            { q: "Câu nào dưới đây có sử dụng biện pháp nhân hóa?", o: ["Mặt trời đỏ như hòn lửa.", "Ông mặt trời đang đạp xe.", "Đêm tối đen như mực.", "Nước chảy róc rách."], a: 1 },
            { q: "Từ nào đồng nghĩa với từ 'Bao la'?", o: ["Chật hẹp", "Nhỏ bé", "Mênh mông", "Cao vút"], a: 2 },
            { q: "Đại từ trong câu 'Hôm nay, tôi đi học sớm.' là từ nào?", o: ["Tôi", "đi", "học", "Không có"], a: 0 },
            { q: "Nhóm từ nào dưới đây toàn là từ láy?", o: ["Xanh xanh, học hành", "Nho nhỏ, xinh xinh", "Mặt mũi, ồn ào", "Tươi tốt, lạnh lẽo"], a: 1 },
            { q: "Từ 'chạy' trong câu 'Đồng hồ này chạy rất đúng giờ' mang nghĩa gì?", o: ["Nghĩa gốc", "Nghĩa chuyển", "Nghĩa bóng", "Từ đồng âm"], a: 1 },
            { q: "Cặp từ 'Cao - Thấp' thuộc loại từ gì?", o: ["Từ đồng nghĩa", "Từ trái nghĩa", "Từ đồng âm", "Từ nhiều nghĩa"], a: 1 },
            { q: "Xác định trạng ngữ trong câu: 'Sáng nay, mẹ đi chợ sớm.'", o: ["mẹ", "đi chợ sớm", "Sáng nay", "đi chợ"], a: 2 },
            { q: "Câu 'Lan không chỉ học giỏi mà bạn ấy còn hát hay.' sử dụng cặp quan hệ từ chỉ:", o: ["Tương phản", "Nguyên nhân - Kết quả", "Tăng tiến", "Điều kiện"], a: 2 }
        ];

        const logicBank = [
            { q: "What is the sum of 15 and 20? (Tổng của 15 và 20 là bao nhiêu?)", o: ["5", "35", "300", "1520"], a: 1 },
            { q: "The perimeter of a square with side 5cm is: (Chu vi hình vuông cạnh 5cm là:)", o: ["20 cm", "25 cm", "10 cm", "15 cm"], a: 0 },
            { q: "Nếu hôm nay là Thứ Ba, thì 10 ngày nữa là Thứ mấy?", o: ["Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"], a: 2 },
            { q: "Có 3 con mèo ăn hết 3 con chuột trong 3 phút. Hỏi 100 con mèo ăn hết 100 con chuột trong bao nhiêu phút?", o: ["100 phút", "3 phút", "1 phút", "300 phút"], a: 1 },
            { q: "Cho dãy số: 1, 3, 6, 10, 15, ... Số tiếp theo là?", o: ["20", "21", "22", "25"], a: 1 },
            { q: "What is the area of a rectangle with length 8cm and width 4cm?", o: ["12 cm2", "24 cm2", "32 cm2", "16 cm2"], a: 2 },
            { q: "Trong một hộp có 5 bi xanh và 5 bi đỏ. Cần lấy ít nhất bao nhiêu viên bi để chắc chắn có 1 viên bi đỏ (không nhìn vào hộp)?", o: ["5 viên", "6 viên", "2 viên", "1 viên"], a: 1 },
            { q: "Half of 50 is: (Một nửa của 50 là:)", o: ["20", "25", "100", "30"], a: 1 },
            { q: "Tìm quy luật: 2, 4, 8, 16, ... Số tiếp theo là?", o: ["20", "24", "32", "64"], a: 2 },
            { q: "Một cây gậy có 2 đầu. Vậy nửa cây gậy có mấy đầu?", o: ["1 đầu", "2 đầu", "3 đầu", "4 đầu"], a: 1 }
        ];

        // Thuật toán xáo trộn mảng
        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let currentQuestions = [];
        let timerInterval;
        let timeRemaining;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function getSubjectBadge(type) {
            if (type === 'math') return '<span class="subject-badge bg-math">TOÁN</span>';
            if (type === 'viet') return '<span class="subject-badge bg-viet">TIẾNG VIỆT</span>';
            return '<span class="subject-badge bg-logic">LOGIC/ANH</span>';
        }

        window.startTest = function(testNumber) {
            initAudio();
            document.getElementById('menuContainer').style.display = 'none';
            document.getElementById('quizWrapper').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            
            document.getElementById('testTitle').innerText = `ĐỀ THI SỐ ${testNumber}`;

            // Thuật toán bốc ngẫu nhiên: 15 Toán, 10 Tiếng Việt, 5 Logic
            let mathQs = shuffle(mathBank).slice(0, 15).map(q => ({...q, type: 'math'}));
            let vietQs = shuffle(vietBank).slice(0, 10).map(q => ({...q, type: 'viet'}));
            let logicQs = shuffle(logicBank).slice(0, 5).map(q => ({...q, type: 'logic'}));
            
            currentQuestions = shuffle([...mathQs, ...vietQs, ...logicQs]);
            
            renderQuestions();
            
            timeRemaining = 20 * 60; // 20 phút
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
        };

        function updateTimer() {
            let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            let s = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timeDisplay').innerText = `⏱ ${m}:${s}`;
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            }
            timeRemaining--;
        }

        function renderQuestions() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            
            currentQuestions.forEach((item, index) => {
                let optionsHTML = item.o.map((opt, i) => `
                    <li>
                        <label id="lbl_q${index}_opt${i}">
                            <input type="radio" name="q${index}" value="${i}"> ${opt}
                        </label>
                    </li>
                `).join('');

                container.innerHTML += `
                    <div class="question-card">
                        <div class="question-title">
                            ${getSubjectBadge(item.type)} Câu ${index + 1}: ${item.q}
                        </div>
                        <ul class="options">${optionsHTML}</ul>
                    </div>
                `;
            });
        }

        window.submitQuiz = function() {
            clearInterval(timerInterval);
            let score = 0;
            let correctCount = 0;

            currentQuestions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const labels = document.querySelectorAll(`input[name="q${index}"]`);
                
                document.getElementById(`lbl_q${index}_opt${item.a}`).classList.add('correct-ans');

                if (selected) {
                    if (parseInt(selected.value) === item.a) {
                        score += 10; 
                        correctCount++;
                        playSound('correct');
                    } else {
                        document.getElementById(`lbl_q${index}_opt${selected.value}`).classList.add('wrong-ans');
                        playSound('wrong');
                    }
                } else {
                    playSound('wrong');
                }
                
                labels.forEach(r => r.disabled = true);
            });

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';

            if (score >= 250) {
                resultDiv.innerHTML = `🏆 XUẤT SẮC!<br>Đạt ${score}/300 điểm (${correctCount}/30 câu).`;
                resultDiv.style.backgroundColor = '#e8f5e9'; resultDiv.style.color = '#2e7d32';
                startConfetti();
            } else if (score >= 150) {
                resultDiv.innerHTML = `👍 RẤT TỐT!<br>Đạt ${score}/300 điểm (${correctCount}/30 câu).`;
                resultDiv.style.backgroundColor = '#e3f2fd'; resultDiv.style.color = '#1565c0';
            } else {
                resultDiv.innerHTML = `💪 CỐ GẮNG LÊN!<br>Đạt ${score}/300 điểm (${correctCount}/30 câu).<br><span style="font-size: 16px; font-weight: normal;">Hãy ôn tập lại các dạng bài bị sai nhé!</span>`;
                resultDiv.style.backgroundColor = '#fff3e0'; resultDiv.style.color = '#e65100';
            }
            window.scrollTo(0, 0);
        };

        window.backToMenu = function() {
            document.getElementById('menuContainer').style.display = 'flex';
            document.getElementById('quizWrapper').style.display = 'none';
            window.scrollTo(0, 0);
        };

        function startConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            canvas.style.display = 'block';
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const particles = [];
            for (let i = 0; i < 200; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, size: Math.random() * 8 + 2, speed: Math.random() * 4 + 2, color: `hsl(${Math.random() * 360}, 100%, 50%)` });
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.y += p.speed; if (p.y > canvas.height) p.y = -10; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
                requestAnimationFrame(animate);
            }
            animate();
            setTimeout(() => { canvas.style.display = 'none'; }, 6000);
        }
    </script>
</body>
</html>
